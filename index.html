<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event System Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                    <line x1="4" y1="22" x2="4" y2="15"></line>
                </svg>
                <span>NexusEvents</span>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-bg"></div>
        <h1>Discover Exceptional Experiences</h1>
        <p>Book your seats for the most exclusive upcoming events across our locations.</p>
    </div>

    <main class="container">

        <!-- Location Filter -->
        <section class="filter-section slide-up">
            <label for="locationFilter">Filter by Location</label>
            <div class="select-wrapper">
                <select id="locationFilter">
                    <option value="all">All Locations</option>
                    <option value="city">Downtown City</option>
                    <option value="campus">University Campus</option>
                    <option value="hall">Main Hall</option>
                </select>
                <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </section>

        <!-- Events Grid -->
        <section id="eventsSection" class="slide-up">
            <h2 class="section-title">Available Events</h2>
            <div id="eventList" class="grid-layout">
                <!-- Events generated by JS -->
            </div>
        </section>

        <!-- Seat Selection -->
        <section id="seatSection" class="glass-panel hidden">
            <div class="panel-header">
                <h3>Select Your Seat</h3>
                <span id="selectedEventLabel" class="badge"></span>
            </div>
            <div class="stage">STAGE</div>
            <div id="seats" class="seat-grid">
                <!-- Seats generated by JS -->
            </div>
            
            <div class="legend">
                <div class="legend-item"><div class="seat-sample available"></div> Available</div>
                <div class="legend-item"><div class="seat-sample selected"></div> Selected</div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" onclick="nextStep()">Continue to Registration 
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </section>

        <!-- Registration -->
        <section id="formSection" class="glass-panel hidden">
            <div class="panel-header">
                <h3>Attendee Details</h3>
            </div>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="E.g. Jane Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="jane@example.com">
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="generatePass()">Generate Pass
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>
        </section>

        <!-- Ticket -->
        <section id="ticketSection" class="hidden">
            <!-- Ticket generated by JS -->
        </section>

    </main>

    <footer>
        <p>&copy; 2026 NexusEvents. All rights reserved.</p>
    </footer>

    <!-- Import html2canvas to allow rendering DOM elements to an image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
